<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset Confirmation | SimpleShop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0d6efd;
      background-image: url('image/bg_image/background.jpg'); /* مسیر تصویر فانتزی */
      background-repeat: repeat-x;
      background-position: 0 50%;
      background-size: auto 100%;
      animation: scrollBackground 120s linear infinite;
    }

    @keyframes scrollBackground {
      0% { background-position: 0 50%; }
      100% { background-position: -1000px 50%; }
    }

    .auth-box {
      width: 100%;
      max-width: 700px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      padding: 40px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .auth-title {
      text-align: center;
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .switch-link {
      margin-top: 20px;
      font-size: 1rem;
    }

    .switch-link a {
      color: #000000; /* رنگ مشکی برای لینک */
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="auth-box">
  <h2 class="auth-title">Check Your Email</h2>
  <p>
    We've sent a secure link to your email address.<br>
    Please check your inbox and click the link to set a new password.
  </p>
  <div class="switch-link">
    <a href="{% url 'login' %}">Back to Login</a>
  </div>
</div>

</body>
</html>
