<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Reset | SimpleShop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0d6efd;
      background-image: url('image/bg_image/background.jpg'); /* مسیر تصویر فانتزی */
      background-repeat: repeat-x;
      background-position: 0 50%;
      background-size: auto 100%;
      animation: scrollBackground 120s linear infinite;
    }

    @keyframes scrollBackground {
      0% { background-position: 0 50%; }
      100% { background-position: -1000px 50%; }
    }

    .auth-box {
      width: 100%;
      max-width: 700px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      padding: 40px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .auth-title {
      color: #0d6efd;
      font-weight: bold;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
    }

    .btn-primary {
      border-radius: 10px;
      padding: 12px;
      font-weight: bold;
      font-size: 1rem;
      width: 100%;
    }

    .switch-link {
      margin-top: 20px;
      font-size: 1rem;
    }

    .switch-link a {
      color: #000000; /* رنگ مشکی برای لینک */
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="auth-box">
  <h2 class="auth-title">Reset Your Password</h2>
  <p class="mb-4">
    Enter your email address and we’ll send you a link to reset your password.
  </p>
  <form>
    <div class="mb-3">
      <label for="resetEmail" class="form-label">Email</label>
      <input type="email" class="form-control" id="resetEmail" placeholder="Enter your email">
    </div>
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
  </form>
  <div class="switch-link">
    <a href="login.html">Back to Login</a>
  </div>
</div>

</body>
</html>
